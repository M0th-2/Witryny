<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="title" content="Wielkanoc">
    <meta name="author" content="Natalia Szendzielorz">
    <title>Wielkanoc</title>
    <style>
        body { 
            background-color: #6964b1; 
            display: flex;
            justify-content: center;
            padding: 50px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        .container { 
            background-color: #8ac1e6;  
            width: 80vw;
            border-radius: 5%; 
            border: 10px double rgb(54, 45, 94);
            padding: 20px;
            text-align: center;
        }
        .row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; 
            margin-bottom: 20px;
        }
        img {
            width: 200px;
            height: auto;
            border: 10px double rgb(54, 45, 94);
        }
        .img1 {
            width: 500px;
        }
    </style>
</head>
<body>
    <div class="container">
       <h1>Strój</h1>
       <h3>Witam! Przedstawiam na tej stronie stroje galowe. Używa się ich w odświętne dni lub kiedy szkoła tego wymaga.</h3>
        <div class="row">
            <img src="nauczyciel.png" alt="nauczycielka">
            
            <img src="uczen.png" alt="uczennica">
        </div>

        <p>Powyżej wizerunek nauczycielki i uczennicy w strojach galowych</p>

    </div>
</body>
</html>
